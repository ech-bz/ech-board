apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: pushsecrets.external-secrets.io
spec:
  group: external-secrets.io
  scope: Namespaced
  names:
    plural: pushsecrets
    singular: pushsecret
    kind: PushSecret
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - updatePolicy
                - deletionPolicy
                - refreshInterval
                - secretStoreRefs
                - selector
                - data
              properties:
                updatePolicy:
                  type: string
                deletionPolicy:
                  type: string
                refreshInterval:
                  type: string
                secretStoreRefs:
                  type: array
                  items:
                    type: object
                    required:
                      - name
                      - kind
                    properties:
                      name:
                        type: string
                      kind:
                        type: string
                selector:
                  type: object
                  required:
                    - secret
                  properties:
                    secret:
                      type: object
                      required:
                        - name
                      properties:
                        name:
                          type: string
                data:
                  type: array
                  items:
                    type: object
                    required:
                      - match
                    properties:
                      match:
                        type: object
                        required:
                          - secretKey
                          - remoteRef
                        properties:
                          secretKey:
                            type: string
                          remoteRef:
                            type: object
                            required:
                              - remoteKey
                            properties:
                              remoteKey:
                                type: string
