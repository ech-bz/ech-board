name: Build relay image

on:
  push:
    branches:
      - main
    paths:
      - relay/**
      - .github/workflows/relay-image.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-amd64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./relay
          file: ./relay/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/ech-board-relay:${{ github.sha }}-amd64
          cache-from: type=gha,scope=relay-amd64
          cache-to: type=gha,mode=max,scope=relay-amd64

  build-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./relay
          file: ./relay/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/ech-board-relay:${{ github.sha }}-arm64
          cache-from: type=gha,scope=relay-arm64
          cache-to: type=gha,mode=max,scope=relay-arm64

  publish-manifest:
    runs-on: ubuntu-latest
    needs:
      - build-amd64
      - build-arm64
    steps:
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        run: docker buildx imagetools create -t ghcr.io/${{ github.repository_owner }}/ech-board-relay:${{ github.sha }} ghcr.io/${{ github.repository_owner }}/ech-board-relay:${{ github.sha }}-amd64 ghcr.io/${{ github.repository_owner }}/ech-board-relay:${{ github.sha }}-arm64
